<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>现在就出发 - AI 本地路线智能规划</title>
  <link rel="stylesheet" href="/static/assets/leaflet/leaflet.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────── -->
  <header class="header">
    <h1>现在就出发</h1>
    <p class="tagline">让 AI 在信息高度不确定的条件下，输出可用的结构化路线</p>
  </header>

  <main class="main">

    <!-- ── 输入区 ────────────────────────── -->
    <section class="input-section">
      <div class="input-row">
        <input type="text" id="userInput"
               placeholder="用自然语言描述你的出行需求，例如：从丈八六路地铁站出发到浐灞玩一天..."
               autofocus>
        <button id="planBtn" onclick="planRoute()">规划路线</button>
      </div>
      <div class="quick-tags">
        <button class="tag" onclick="setTag('美食之旅')">美食</button>
        <button class="tag" onclick="setTag('骑行放松')">骑行</button>
        <button class="tag" onclick="setTag('亲子出游')">亲子</button>
        <button class="tag" onclick="setTag('约会路线')">约会</button>
        <button class="tag" onclick="setTag('文化探索')">文化</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <!-- ── 结果区 ─────────────────────────── -->
    <section id="resultArea" class="result-area" style="display:none">
      <div class="result-grid">
        <div id="map" class="map-panel"></div>
        <div class="narration-panel">
          <div id="narration" class="narration-text"></div>
          <div id="mermaidContainer" class="mermaid-diagram">
            <pre class="mermaid" id="mermaidCode"></pre>
          </div>
        </div>
      </div>

      <!-- ── 多轮对话 ────────────────────── -->
      <div class="chat-section">
        <div class="input-row chat-row">
          <input type="text" id="chatInput"
                 placeholder="对路线不满意？告诉我你想怎么改，例如：不去钟楼了，换个大雁塔..."
                 onkeydown="if(event.key==='Enter') modifyRoute()">
          <button id="chatBtn" onclick="modifyRoute()">修改路线</button>
        </div>
        <div id="chatStatus" class="status"></div>
      </div>
    </section>

    <!-- ── 历史区 ─────────────────────────── -->
    <section class="history-section">
      <details>
        <summary>历史路线</summary>
        <div id="historyList" class="history-list">暂无记录</div>
      </details>
    </section>

  </main>

  <footer class="footer">
    美团 AI 黑客松 · 现在就出发
  </footer>

  <script src="/static/assets/leaflet/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    let map = null;
    let sessionId = null;

    function setTag(text) {
      document.getElementById('userInput').value = text;
    }

    async function planRoute() {
      const input = document.getElementById('userInput').value.trim();
      if (!input) return;

      const status = document.getElementById('status');
      const btn = document.getElementById('planBtn');
      status.innerHTML = '<span class="progress-step">规划中...</span>';
      btn.disabled = true;

      try {
        const resp = await fetch('/api/plan/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: input }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // 解析 SSE 事件
          const lines = buffer.split('\n');
          buffer = lines.pop(); // 保留未完成行
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.type === 'progress') {
                addProgress(evt.emoji, evt.msg);
              } else if (evt.type === 'result') {
                sessionId = evt.session_id;
                status.textContent = '规划完成';
                btn.disabled = false;
                showResult(evt);
                addHistory(input, evt);
              } else if (evt.type === 'error') {
                status.textContent = '规划失败：' + evt.error;
                btn.disabled = false;
              }
            } catch (e) {}
          }
        }
      } catch (err) {
        status.textContent = '规划失败：' + err.message;
        btn.disabled = false;
      }
    }

    function addProgress(emoji, msg) {
      const status = document.getElementById('status');
      const step = document.createElement('span');
      step.className = 'progress-step';
      step.textContent = emoji + ' ' + msg;
      status.appendChild(step);
    }

    async function modifyRoute() {
      const input = document.getElementById('chatInput').value.trim();
      if (!input || !sessionId) return;

      const status = document.getElementById('chatStatus');
      const btn = document.getElementById('chatBtn');
      status.textContent = '修改中...';
      btn.disabled = true;

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: input, session_id: sessionId }),
        });
        const data = await resp.json();
        if (data.error) {
          status.textContent = '修改失败：' + data.error;
          btn.disabled = false;
          return;
        }
        status.textContent = '修改完成';
        btn.disabled = false;
        document.getElementById('chatInput').value = '';
        showResult(data);
        addHistory(input, data);
      } catch (err) {
        status.textContent = '修改失败：' + err.message;
        btn.disabled = false;
      }
    }

    async function renderMermaid(code) {
      if (!code) return;
      const el = document.getElementById('mermaidCode');
      el.textContent = code;
      el.removeAttribute('data-processed');
      try {
        const { svg } = await mermaid.render('mermaidSvg', code);
        el.innerHTML = svg;
      } catch (e) {
        el.textContent = code;
      }
    }

    function showResult(data) {
      document.getElementById('resultArea').style.display = 'block';
      document.getElementById('narration').textContent = data.narration || '暂无解说';
      renderMermaid(data.mermaid);

      // 地图
      const stops = data.stops || [];
      const validStops = stops.filter(s => s.lat !== null && s.lng !== null);

      if (!map) {
        const centerLat = validStops.length > 0 ? validStops[0].lat : 34.26;
        const centerLng = validStops.length > 0 ? validStops[0].lng : 108.94;
        map = L.map('map').setView([centerLat, centerLng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);
      }

      // 清除旧的 markers/polylines
      map.eachLayer(l => {
        if (l instanceof L.Marker || l instanceof L.Polyline) map.removeLayer(l);
      });

      if (validStops.length > 0) {
        const markers = validStops.map(s => {
          const cls = s.num === 0 ? 'marker-start' : 'marker-mid';
          const icon = L.divIcon({
            html: `<div class="custom-marker ${cls}">${s.num || ''}</div>`,
            iconSize: [28, 28], iconAnchor: [14, 14], className: '',
          });
          const popup = `<b>${s.name}</b>` +
            (s.rating ? `<br>⭐ ${s.rating}` : '') +
            (s.price ? `<br>💰 ¥${s.price}` : '') +
            (s.address ? `<br>📍 ${s.address}` : '');
          return L.marker([s.lat, s.lng], { icon }).addTo(map).bindPopup(popup);
        });

        if (validStops.length > 1) {
          L.polyline(validStops.map(s => [s.lat, s.lng]), {
            color: '#2563eb', weight: 3, opacity: 0.7, dashArray: '8,5'
          }).addTo(map);
        }

        const group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.15));
      }
    }

    function addHistory(input, data) {
      const list = document.getElementById('historyList');
      if (list.textContent === '暂无记录') list.textContent = '';
      const item = document.createElement('div');
      item.className = 'history-item';
      const time = new Date().toLocaleTimeString();
      item.textContent = `[${time}] ${input.slice(0, 50)}${input.length > 50 ? '...' : ''}`;
      item.onclick = () => {
        document.getElementById('narration').textContent = data.narration || '';
        renderMermaid(data.mermaid);
      };
      list.prepend(item);
    }
  </script>
</body>
</html>
